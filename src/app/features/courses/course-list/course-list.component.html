<h2 class="title">
  {{ previewMode ? 'Nos Cours Populaires' : 'Tous les cours' }}
</h2>

<!-- PREVIEW GRID -->
<div *ngIf="previewMode" class="course-list preview-grid">
  <div *ngFor="let course of displayedCourses" class="course-card">
    <img
      [src]="course.imgUrl"
      alt="Image du cours"
      class="course-image"
    />
    <div class="course-details">
      <h3 class="course-title">{{ course.nom }}</h3>
      <p class="course-description">{{ course.description }}</p>
      <!-- → Linka al dettaglio (sessions) -->
      <button
        class="course-button"
        [routerLink]="['/courses', course.idCours]"
      >
        Voir les sessions
      </button>
    </div>
  </div>
  <a routerLink="/courses" class="view-all-courses">
    Voir tous les cours disponibles →
  </a>
</div>

<!-- FULL LIST -->
<ng-container *ngIf="!previewMode">
  <div class="courses-toolbar">
    <input
      type="text"
      placeholder="Rechercher un cours..."
      [(ngModel)]="searchTerm"
      (input)="applyFilters()"
      class="search-input"
    />
    <select
      [(ngModel)]="selectedStatus"
      (change)="applyFilters()"
      class="status-filter"
    >
      <option value="">Tous les statuts</option>
      <option value="Actif">Actif</option>
      <option value="Inactif">Inactif</option>
      <option value="Brouillon">Brouillon</option>
    </select>
    <button
      *ngIf="canAddCourse"
      class="add-course-btn"
      (click)="onAddCourse()"
    >
      + Ajouter un cours
    </button>
  </div>

  <div class="courses-list">
    <table>
      <thead>
      <tr>
        <th>COURS</th>
        <th>STATUT</th>
        <th>SESSIONS</th>
        <th>ACTIONS</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let course of filteredCourses">
        <!-- Colonna Cours -->
        <td>
          <img
            [src]="course.imgUrl"
            alt="img"
            class="course-img"
          />
          <div>
            <strong>{{ course.nom }}</strong>
            <div class="desc">{{ course.description }}</div>
          </div>
        </td>

        <!-- Colonna Statut -->
        <td>
            <span
              [ngClass]="{
                'status-actif':    course.statut === 'Actif',
                'status-inactif':  course.statut === 'Inactif',
                'status-brouillon':course.statut === 'Brouillon'
              }"
            >
              {{ course.statut }}
            </span>
        </td>

        <!-- Colonna Sessions -->
        <td class="sessions-col">
          <button
            class="icon-btn"
            [routerLink]="['/courses', course.idCours]"
            title="Voir sessions"
          >
            <mat-icon>calendar_today</mat-icon>
          </button>
        </td>

        <!-- Colonna Azioni -->
        <td>
          <button
            class="icon-btn"
            (click)="onEditCourse(course)"
            *ngIf="canEditCourse"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            class="icon-btn"
            (click)="onDeleteCourse(course)"
            *ngIf="canDeleteCourse"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="filteredCourses.length === 0" class="no-courses">
    <p>Aucun cours disponible pour le moment.</p>
  </div>
</ng-container>
