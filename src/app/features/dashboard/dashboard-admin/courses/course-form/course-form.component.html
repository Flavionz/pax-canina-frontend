<div class="course-form-overlay">
  <div class="course-form-modal">
    <h3>{{ course ? 'Modifier le cours' : 'Nouveau cours' }}</h3>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nom *</label>
        <input formControlName="name" type="text" required />
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" required></textarea>
      </div>
      <div class="form-group">
        <label>Statut *</label>
        <select formControlName="status" required>
          <option value="OPEN">Ouvert</option>
          <option value="CLOSED">Fermé</option>
        </select>
      </div>
      <div class="form-group">
        <label>Image (URL)</label>
        <input formControlName="imageUrl" type="url" />
      </div>
      <div class="form-group">
        <label>Spécialisation(s) *</label>
        <select formControlName="specializations" multiple required>
          <option *ngFor="let spec of allSpecializations" [value]="spec.id">
            {{ spec.name }}
          </option>
        </select>
        <div class="error"
             *ngIf="form.get('specializations')?.invalid && (form.get('specializations')?.dirty || form.get('specializations')?.touched)">
          Veuillez sélectionner au moins une spécialisation.
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Enregistrer</button>
        <button class="btn btn-secondary" type="button" (click)="closeModal()">Annuler</button>
      </div>
    </form>
  </div>
</div>
