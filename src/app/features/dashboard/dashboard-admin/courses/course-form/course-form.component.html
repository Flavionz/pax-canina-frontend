<div class="course-form-modal">
  <h3>{{ course ? 'Modifier le cours' : 'Nouveau cours' }}</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Nom *</label>
      <input formControlName="name" type="text" required autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Description *</label>
      <textarea formControlName="description" required></textarea>
    </div>
    <div class="form-group">
      <label>Image (URL)</label>
      <input formControlName="imageUrl" type="url" />
    </div>

    <div class="form-group">
      <label>Spécialisation(s) *</label>
      <div class="specialization-badges">
        <span *ngFor="let s of selectedSpecializations" class="badge">
          {{ s.name }}
          <button type="button" class="remove-btn" (click)="removeSpecialization(s)">×</button>
        </span>
      </div>
      <div class="spec-actions">
        <select [(ngModel)]="selectedSpec" [ngModelOptions]="{standalone: true}">
          <option [ngValue]="null" disabled selected>Ajouter...</option>
          <option *ngFor="let s of availableSpecializations" [ngValue]="s">{{ s.name }}</option>
        </select>
        <button type="button" class="add-btn" (click)="addSpecialization()" [disabled]="!selectedSpec">
          Ajouter
        </button>
      </div>
      <div class="hint error" *ngIf="specializationError">
        Veuillez sélectionner au moins une spécialisation.
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || specializationError">Enregistrer</button>
      <button class="btn btn-secondary" type="button" (click)="closeModal()">Annuler</button>
    </div>
  </form>
</div>
