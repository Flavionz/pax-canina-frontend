<div class="form-overlay">
  <form [formGroup]="form" (ngSubmit)="submit()" class="session-form">
    <h3>Nouvelle session</h3>
    <div class="form-row">
      <label>Cours *</label>
      <select formControlName="courseId" required>
        <option value="">Sélectionner...</option>
        <option *ngFor="let c of courses" [value]="c.idCourse">
          {{ c.name }}
        </option>
      </select>
    </div>

    <div class="form-row">
      <label>Coach *</label>
      <select formControlName="coachId" required>
        <option value="">Sélectionner...</option>
        <option *ngFor="let coach of coaches" [value]="coach.id">
          {{ coach.firstName }} {{ coach.lastName }}
        </option>
      </select>
    </div>

    <div class="form-row">
      <label>Date *</label>
      <input type="date" formControlName="date" required>
    </div>

    <div class="form-row">
      <label>Heure début *</label>
      <input type="time" formControlName="startTime" required>
      <label>Heure fin *</label>
      <input type="time" formControlName="endTime" required>
    </div>

    <div class="form-row">
      <label>Niveau *</label>
      <select formControlName="level" required>
        <option value="">Sélectionner...</option>
        <option value="BEGINNER">Débutant</option>
        <option value="INTERMEDIATE">Intermédiaire</option>
        <option value="ADVANCED">Avancé</option>
      </select>
      <label>Capacité max *</label>
      <input type="number" formControlName="maxCapacity" min="1" required>
    </div>

    <div class="form-row">
      <label>Lieu</label>
      <input type="text" formControlName="location">
      <label>Image (URL)</label>
      <input type="text" formControlName="imageUrl">
    </div>

    <div class="form-row">
      <label>Description</label>
      <textarea formControlName="description"></textarea>
    </div>

    <div class="form-row">
      <label>Tranche d'âge *</label>
      <select formControlName="ageGroupId" required>
        <option value="">Sélectionner...</option>
        <option *ngFor="let ag of ageGroups" [value]="ag.idAgeGroup">
          {{ translateAgeGroup(ag.name) }}
          <ng-container *ngIf="ag.minAge !== null && ag.minAge !== undefined">
            <ng-container *ngIf="ag.maxAge !== null && ag.maxAge !== undefined">
              ({{ ag.minAge }} - {{ ag.maxAge }} mois)
            </ng-container>
            <ng-container *ngIf="ag.maxAge === null || ag.maxAge === undefined">
              ({{ ag.minAge }} mois+)
            </ng-container>
          </ng-container>
        </option>
      </select>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="form.invalid">Enregistrer</button>
      <button type="button" (click)="closeModal()">Annuler</button>
    </div>
  </form>
</div>
