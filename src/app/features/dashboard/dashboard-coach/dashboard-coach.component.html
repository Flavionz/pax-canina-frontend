<div class="dashboard-coach" *ngIf="!loading">
  <div class="dashboard-header">
    <h2>Bonjour Coach {{ coach?.firstName }} {{ coach?.lastName }}</h2>
  </div>

  <div class="card">
    <h3 class="card-title">Vos sessions</h3>
    <button class="btn btn-primary mb-2" routerLink="/sessions/add">Créer une nouvelle session</button>
    <ul class="session-list">
      <li *ngFor="let session of sessions" class="session-item">
        <span class="session-course">{{ session.course?.name }}</span>
        <span class="session-date">
          ({{ session.date | date:'shortDate' }})
        </span>
        <span class="session-level" *ngIf="session.level">| {{ session.level }}</span>
      </li>
    </ul>
    <div *ngIf="!sessions || sessions.length === 0" class="text-muted mt-2">
      Aucune session trouvée.
    </div>
  </div>

  <div class="card">
    <h3 class="card-title">Statistiques de participation (à venir)</h3>
    <p class="text-muted">Fonctionnalité en cours de développement...</p>
  </div>
</div>
<div *ngIf="loading" class="loading-message">Chargement...</div>
