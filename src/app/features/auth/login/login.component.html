<div class="login-container">
  <div class="login-card">
    <h1>Connexion</h1>
    <p class="subtitle">Connectez-vous à votre compte Pax Canina</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input id="email" type="email" formControlName="email" placeholder="Entrez votre e-mail" />
        <div class="error" *ngIf="email?.invalid && (email?.dirty || email?.touched)">
          L'adresse e-mail est requise
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Entrez votre mot de passe"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility"
          >
            <span *ngIf="!showPassword">&#128065;</span>
            <span *ngIf="showPassword">&#128064;</span>
          </button>
        </div>
        <div class="error" *ngIf="password?.invalid && (password?.dirty || password?.touched)">
          Le mot de passe est requis
        </div>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" formControlName="rememberMe" /> Se souvenir de moi
        </label>
        <div class="remember-feedback" *ngIf="loginForm.get('rememberMe')?.value">
          Vous serez automatiquement connecté la prochaine fois.
        </div>
        <a class="forgot" routerLink="/auth/forgot-password">Mot de passe oublié ?</a>
      </div>

      <button class="login-btn" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading">Connexion...</span>
      </button>

      <div class="error" *ngIf="error">{{ error }}</div>
    </form>

    <div class="register-link">
      Pas encore de compte ?
      <a routerLink="/auth/register">S’inscrire</a>
    </div>
  </div>
</div>
