<h2>Changer le mot de passe</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <!-- Mot de passe actuel -->
  <div class="field">
    <label>Mot de passe actuel</label>
    <div class="pwd">
      <input
        [type]="showCurrent ? 'text' : 'password'"
        formControlName="currentPassword"
        placeholder="Votre mot de passe actuel"
      />
      <button type="button" (click)="toggle('current')" aria-label="Afficher/Masquer">👁️</button>
    </div>
    <div
      class="error"
      *ngIf="currentPassword?.invalid && (currentPassword?.touched || currentPassword?.dirty)"
    >
      Le mot de passe actuel est requis.
    </div>
  </div>

  <!-- Nouveau mot de passe -->
  <div class="field">
    <label>Nouveau mot de passe</label>
    <div class="pwd">
      <input
        [type]="showNew ? 'text' : 'password'"
        formControlName="newPassword"
        placeholder="Nouveau mot de passe"
      />
      <button type="button" (click)="toggle('new')" aria-label="Afficher/Masquer">👁️</button>
    </div>
    <div class="hint">
      Force: <strong [class]="strength">{{ strength }}</strong>
    </div>
    <div
      class="error"
      *ngIf="newPassword?.errors && (newPassword?.touched || newPassword?.dirty)"
    >
      <span *ngIf="newPassword?.errors?.['required']">Le nouveau mot de passe est requis.</span>
      <span *ngIf="newPassword?.errors?.['minlength']">Au moins 8 caractères.</span>
      <span *ngIf="newPassword?.errors?.['pattern']">Inclure lettres et chiffres.</span>
    </div>
  </div>

  <!-- Confirmer le mot de passe -->
  <div class="field">
    <label>Confirmer le mot de passe</label>
    <div class="pwd">
      <input
        [type]="showConfirm ? 'text' : 'password'"
        formControlName="confirmPassword"
        placeholder="Confirmer le mot de passe"
      />
      <button type="button" (click)="toggle('confirm')" aria-label="Afficher/Masquer">👁️</button>
    </div>
    <div
      class="error"
      *ngIf="form.errors?.['mismatch'] && (confirmPassword?.touched || confirmPassword?.dirty)"
    >
      Les mots de passe ne correspondent pas.
    </div>
  </div>

  <!-- Erreur serveur -->
  <div class="error" *ngIf="serverError">{{ serverError }}</div>

  <!-- Succès -->
  <div class="success" *ngIf="success">
    Mot de passe modifié avec succès ✅
  </div>

  <!-- Actions -->
  <div class="actions">
    <button type="submit" [disabled]="loading">Enregistrer</button>
    <button type="button" class="secondary" (click)="onCancel()">Annuler</button>
  </div>
</form>
