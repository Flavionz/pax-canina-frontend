<div class="auth-container">
  <div class="card">
    <h1>Mot de passe oublié</h1>
    <p class="subtitle">
      Saisissez votre adresse e-mail. Si un compte existe, vous recevrez un lien pour réinitialiser votre mot de passe.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input id="email" type="email" formControlName="email" placeholder="ex. jean.dupont@mail.com" />
        <div class="error" *ngIf="email?.invalid && (email?.dirty || email?.touched)">
          <span *ngIf="email?.errors?.['required']">L’e-mail est requis.</span>
          <span *ngIf="email?.errors?.['email']">Format d’e-mail invalide.</span>
        </div>
      </div>

      <button class="btn" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Envoyer le lien</span>
        <span *ngIf="loading">Envoi…</span>
      </button>
    </form>

    <div class="info success" *ngIf="submitted">
      Si l’adresse correspond à un compte, un e-mail a été envoyé avec les instructions.
      <div class="mt">
        <a routerLink="/auth/login">Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
