<div class="register-container">
  <div class="register-card">
    <h1>Créer un compte</h1>
    <p class="subtitle">Rejoignez la communauté ClubCanine</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input id="prenom" type="text" formControlName="prenom" placeholder="Votre prénom" />
          <div class="error" *ngIf="prenom.invalid && (prenom.dirty || prenom.touched)">
            Le prénom est requis
          </div>
        </div>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input id="nom" type="text" formControlName="nom" placeholder="Votre nom" />
          <div class="error" *ngIf="nom.invalid && (nom.dirty || nom.touched)">
            Le nom est requis
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input id="email" type="email" formControlName="email" placeholder="Votre e-mail" />
        <div class="error" *ngIf="email.invalid && (email.dirty || email.touched)">
          L'adresse e-mail est requise et doit être valide
        </div>
      </div>

      <div class="form-group">
        <label for="telephone">Téléphone</label>
        <input id="telephone" type="tel" formControlName="telephone" placeholder="Votre téléphone" />
        <div class="error" *ngIf="telephone.invalid && (telephone.dirty || telephone.touched)">
          Le téléphone est requis
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Créer un mot de passe"
          />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
            <span *ngIf="!showPassword">&#128065;</span>
            <span *ngIf="showPassword">&#128064;</span>
          </button>
        </div>
        <div class="error" *ngIf="password.invalid && (password.dirty || password.touched)">
          Le mot de passe est requis (au moins 6 caractères)
        </div>
      </div>

      <div class="form-group conditions">
        <label>
          <input type="checkbox" formControlName="conditions" />
          J'accepte les <a href="#" target="_blank">conditions d'utilisation</a>
        </label>
        <div class="error" *ngIf="conditions.invalid && (conditions.dirty || conditions.touched)">
          Vous devez accepter les conditions
        </div>
      </div>

      <button class="register-btn" type="submit">
        Créer un compte
      </button>
    </form>

    <div class="login-link">
     Deja un compte ?
      <a routerLink="/auth/login">Se connecter</a>
   </div>
</div>
</div>
