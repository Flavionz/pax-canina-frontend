<form [formGroup]="dogForm">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nom du chien</mat-label>
    <input matInput formControlName="name" placeholder="Ex: Max">
    <mat-error *ngIf="dogForm.get('name')?.hasError('required')">
      Le nom est requis
    </mat-error>
  </mat-form-field>

  <!-- Select per razza -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Race</mat-label>
    <mat-select formControlName="idBreed">
      <mat-option value="">Sélectionner...</mat-option>
      <mat-option *ngFor="let b of breeds" [value]="b.idBreed">{{ b.name }}</mat-option>
    </mat-select>
    <mat-error *ngIf="dogForm.get('idBreed')?.hasError('required')">
      La race est requise
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Date de naissance</mat-label>
    <input
      matInput
      [matDatepicker]="picker"
      formControlName="birthDate"
      placeholder="JJ/MM/AAAA"
      required
    >
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
    <mat-error *ngIf="dogForm.get('birthDate')?.hasError('required')">
      La date de naissance est requise
    </mat-error>
    <mat-hint>Format: JJ/MM/AAAA</mat-hint>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Sexe</mat-label>
    <mat-select formControlName="sex">
      <mat-option value="M">Mâle</mat-option>
      <mat-option value="F">Femelle</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="two-columns">
    <mat-form-field appearance="outline">
      <mat-label>Poids (kg)</mat-label>
      <input matInput type="number" formControlName="weight" placeholder="Ex: 25">
      <mat-error *ngIf="dogForm.get('weight')?.hasError('required') || dogForm.get('weight')?.hasError('min')">
        Le poids est requis et doit être positif
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Numéro de puce</mat-label>
      <input matInput formControlName="chipNumber" placeholder="Ex: 123456789012345">
    </mat-form-field>
  </div>

  <!-- Upload image -->
  <div class="photo-upload">
    <p><strong>Photo</strong></p>
    <div class="upload-zone">
      <input type="file" #fileInput style="display: none" accept="image/*" (change)="onFileSelected($event)">
      <button type="button" mat-stroked-button (click)="fileInput.click()" class="upload-button">
        <mat-icon>upload</mat-icon> Télécharger une photo
      </button>
      <span *ngIf="selectedPhotoFile" class="file-selected">{{ selectedPhotoFile.name }}</span>
    </div>
  </div>
</form>
