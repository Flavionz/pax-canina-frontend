<div class="calendar-page">
  <div class="calendar-grid">

    <!-- Calendario -->
    <div class="calendar-panel mat-elevation-z2">
      <h2>Calendrier</h2>
      <mat-calendar
        [(selected)]="selectedDate"
        (selectedChange)="onDateChange($event)"
        (activeDateChange)="onMonthChange($event)"
        [dateClass]="dateClass">
      </mat-calendar>
    </div>

    <!-- Sessioni -->
    <div class="sessions-panel mat-elevation-z2">
      <h2>Sessions du {{ selectedDate | date:'d MMMM':'':'fr' }}</h2>
      <ng-container *ngIf="sessionsForSelectedDate.length; else noSessions">
        <ul>
          <li *ngFor="let s of sessionsForSelectedDate">
            {{ s.title }}
            <span class="status" [class.full]="s.status==='full'">
              ({{ s.status==='full' ? 'Complet' : 'Disponible' }})
            </span>
          </li>
        </ul>
      </ng-container>
      <ng-template #noSessions>
        <div class="no-sessions">
          <mat-icon>event_busy</mat-icon>
          <p>Pas de sessions</p>
        </div>
      </ng-template>
    </div>

  </div>

  <!-- Legenda -->
  <div class="calendar-legend mat-elevation-z2">
    <span><span class="dot selected"></span> Date sélectionnée</span>
    <span><span class="dot today"></span> Aujourd'hui</span>
    <span><span class="dot available"></span> Sessions disponibles</span>
    <span><span class="dot full"></span> Session complète</span>
  </div>
</div>
