<header class="navbar">
  <div class="navbar__logo">
    <img src="assets/icons/logo-sans-scri.png" alt="Pax Canina Logo" />
    <span>Pax Canina</span>
  </div>

  <div class="navbar__burger" (click)="toggleMenu()">
    <img src="assets/icons/burger.svg" alt="Menu" />
  </div>

  <nav class="navbar__links" [ngClass]="{'active': isMenuOpen}">
    <ul>
      <li>
        <a routerLink="/home" routerLinkActive="active">
          <img src="assets/icons/maison.png" alt="Home Icon" />
          Accueil
        </a>
      </li>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active">
          <img src="assets/icons/tableau-de-bord.png" alt="Dashboard Icon" />
          Tableau de bord
        </a>
      </li>
      <li>
        <a routerLink="/profile" routerLinkActive="active">
          <img src="assets/icons/utilisateur.png" alt="Profile Icon" />
          Profil
        </a>
      </li>
      <li>
        <a routerLink="/calendar" routerLinkActive="active">
          <img src="assets/icons/calendrier.png" alt="Calendar Icon" />
          Calendrier
        </a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="active">
          <img src="assets/icons/contact.png" alt="Contact Icon" />
          Contact
        </a>
      </li>
    </ul>
  </nav>
  <div class="navbar__logout">
    <a routerLink="/auth/logout">
      <img src="assets/icons/deconnexion.png" alt="Logout Icon" />
      Déconnexion
    </a>
  </div>
</header>
